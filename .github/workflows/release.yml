name: Release Donna

# Triggers when you push a version tag: git tag v0.1.0 && git push origin v0.1.0
# Or manually from GitHub Actions → Run workflow → enter tag
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write   # required to create GitHub Releases and upload assets

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve tag ─────────────────────────────────────────────────────
      # github.ref_name = branch name on workflow_dispatch, tag name on push.
      # We normalise both into a single output so downstream steps are simple.
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # ── 3. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Rust (required by Tauri) ────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 5. Install JS dependencies (Tauri CLI lives in node_modules) ───────
      - name: Install Node dependencies
        run: npm ci

      # ── 6. Build Tauri → produces universal .dmg ───────────────────────────
      #
      # Architecture: Donna's Tauri shell loads https://imdonna.app at runtime.
      # No Next.js static export needed — this step only compiles the Rust layer
      # (desktop observer, screen OCR, system tray) and packages the DMG.
      #
      # OPTIONAL CODE SIGNING — add these secrets when you have an Apple Developer account:
      #   APPLE_CERTIFICATE          base64-encoded .p12 file
      #   APPLE_CERTIFICATE_PASSWORD password for the .p12
      #   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)"
      #   APPLE_ID                   your Apple ID email
      #   APPLE_PASSWORD             app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID              10-character team ID
      # When those secrets are present, Tauri auto-signs and notarizes.
      # Without them, it builds an unsigned DMG — totally fine for early testing.
      #
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple code signing — uncomment these lines once you have an Apple Developer
          # account and have added the secrets in GitHub → Settings → Secrets → Actions:
          #   APPLE_CERTIFICATE          base64-encoded .p12 file
          #   APPLE_CERTIFICATE_PASSWORD password for the .p12
          #   APPLE_SIGNING_IDENTITY     e.g. "Developer ID Application: Your Name (TEAMID)"
          #   APPLE_ID                   your Apple ID email
          #   APPLE_PASSWORD             app-specific password from appleid.apple.com
          #   APPLE_TEAM_ID              10-character team ID
          #
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ steps.tag.outputs.value }}
          releaseName: 'Donna ${{ steps.tag.outputs.value }}'
          releaseBody: |
            ## Donna ${{ steps.tag.outputs.value }}

            Download **Donna.dmg** below, open it, and drag Donna into your Applications folder.

            > **First time?** If macOS shows an "unidentified developer" warning,
            > right-click the app → **Open** → **Open**. You only need to do this once.
          releaseDraft: true      # Creates a draft — you review and click Publish when ready
          prerelease: false
          includeDebug: false
          args: --target universal-apple-darwin   # builds fat binary: Apple Silicon + Intel

      # ── Rename DMG to stable filename ─────────────────────────────────────────
      # Tauri produces Donna_0.1.0_universal.dmg — rename to Donna.dmg so the
      # download URL never changes between releases.
      - name: Rename DMG to stable filename
        run: |
          find src-tauri/target/release/bundle/dmg -name "*.dmg" \
            -exec mv {} src-tauri/target/release/bundle/dmg/Donna.dmg \;

